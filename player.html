<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <title>Custom HLS Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main: rgb(225, 23, 67);
            --bg: rgba(15, 15, 20, 0.92);
            --text: rgba(255, 255, 255, 0.88);
            --text-hover: #fff;
            --track-bg: rgba(255, 255, 255, 0.2);
            --buffer-bg: rgba(255, 255, 255, 0.1);
            --preview-bg: rgba(255, 255, 255, 0.25);
            --font: Roboto, system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .player {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
            outline: none;
        }

        .player video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .player-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            opacity: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            z-index: 10;
        }
        .player::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.4) 0%,
                rgba(0, 0, 0, 0) 100%
            );
            pointer-events: none; 
            z-index: 1;
            opacity: 0;
        }


        .player .player-ui {
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
        }

        .player #playBtnMobile {
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }

        .player.ui-visible .player-ui,
        .player.ui-visible #playBtnMobile {
            opacity: 1;
            pointer-events: auto;
        }
        .player.ui-visible::after{
            opacity: 1;
        }


        .player:not(.ui-visible) {
            cursor: none;
        }

        .player.Fs.ui-visible {
            cursor: default;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            pointer-events: none;
            z-index: 130;
        }
        .loading-spinner__icon {
            width: 40px;
            height: 40px;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .player:not(.loading) .loading-spinner {
            display: none;
        }

        .btn {
            position: relative;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 18px;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background 0.2s;
            display: block;
        }

        .btn:hover,
        .btn:focus-visible {
            color: var(--text-hover);
            outline: none;
        }

        .btn--active {
            color: var(--main);
        }

        .icon {
            display: block;
            width: 1.75em;
            height: 1.75em;
            color: rgba(255, 255, 255, 0.8);
            transition: color 0.15s ease;
        }

        .icon:hover {
            color: #fff;
        }

        #playIcon .icon-play {
            display: inline-flex;
        }

        #playIcon .icon-pause {
            display: none;
        }

        #playBtn.btn--active #playIcon .icon-play {
            display: none;
        }

        #playBtn.btn--active #playIcon .icon-pause {
            display: inline-flex;
        }

        #volumeIcon .icon-volume-high,
        #volumeIcon .icon-volume-medium,
        #volumeIcon .icon-volume-mute {
            display: none;
        }

        #volumeIcon:not(.volume-medium):not(.volume-muted) .icon-volume-high,
        #volumeIcon.volume-medium .icon-volume-medium,
        #volumeIcon.volume-muted .icon-volume-mute{
            display: inline-flex;
        }

        .dropdown {
            position: relative;
        }

        #speedDropdown .dropdown__trigger {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-family: Roboto, system-ui, sans-serif;
            font-size: 18px;
            font-weight: 700;
            height: 32px;
            line-height: 1;
            padding: 0 2px 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s ease;
        }

        #speedDropdown .dropdown__trigger:hover,
        #speedDropdown .dropdown__trigger:focus {
            color: #fff;
        }

        #qualityDropdown .dropdown__trigger {
            position: relative;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 18px;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background 0.2s;
            display: block;
        }

        #qualityDropdown .dropdown__trigger:hover,
        #qualityDropdown .dropdown__trigger:focus {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .dropdown__menu {
            position: absolute;
            bottom: 108px;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: var(--bg);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 4px 0;
            min-width: 70px;


            max-height: calc(var(--player-h, 400px) * 0.7);
            overflow-y: auto;
            overscroll-behavior: contain;

            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 130;
        }

        .dropdown__menu::-webkit-scrollbar {
            width: 4px;
        }

        .dropdown__menu::-webkit-scrollbar-track {
            background: transparent;
        }

        .dropdown__menu::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;

        }

        .dropdown__menu::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .dropdown.open .dropdown__menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .dropdown__option {
            display: block;
            width: 100%;
            padding: 8px 16px;
            font-size: 14px;
            font-family: Roboto, system-ui, sans-serif;
            font-weight: 500;
            color: #fff;
            background: transparent;
            border: none;
            text-align: center;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .dropdown__option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .dropdown__option--selected {
            background: rgba(255, 255, 255, 0.15);
            font-weight: 700;
        }

        .dropdown.open .tooltip-style[data-for*="Dropdown"] {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        .volume {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .volume__bar-wrapper {
            width: 0;
            max-width: 0;
            overflow: hidden;
            opacity: 0;
            margin-left: 0;
            display: flex;
            align-items: center;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
            max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
            opacity 0.25s ease,
            margin-left 0.3s ease;
            padding-right: 50px;
            margin-right: -50px;
            padding-block: 10px;
        }

        .volume:hover .volume__bar-wrapper,
        .volume:focus-within .volume__bar-wrapper,
        .volume__bar-wrapper:hover {
            width: 120px;
            max-width: 120px;
            opacity: 1;
            margin-left: 8px;
        }

        .volume__bar {
            width: 100%;
            height: 6px;
            background: var(--track-bg);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .volume__bar-wrapper:hover .volume__bar {
            height: 12px;
        }

        .volume__fill {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 100%;
            background: #fff;
            border-radius: 2px;
            pointer-events: none;
            transition: width 0.1s linear;
        }

        .volume__preview {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 0%;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 2px;
            pointer-events: none;
            transition: width 0.05s linear, height 0.2s ease;
            z-index: 5;
        }

        .volume__bar-wrapper:hover .volume__preview {
            height: 12px;
        }


        .time {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .time__current,
        #duration {
            min-width: 5ch;
        }

        .time__current {
            text-align: right;
        }

        #duration {
            text-align: left;
        }


        #qualityLabel .icon-hd {
            display: inline-flex;
        }

        #qualityLabel .icon-sd {
            display: none;
        }

        #qualityLabel.sd-mode .icon-hd {
            display: none;
        }

        #qualityLabel.sd-mode .icon-sd {
            display: inline-flex;
        }

        #pipBtn.btn--active .icon-pip {
            opacity: 0.5;
        }

        #fsIcon .icon-fs-enter,
        #fsIcon .icon-fs-exit {
            display: none;
        }

        #fullscreenBtn:not(.fs-active) #fsIcon .icon-fs-enter {
            display: inline-flex;
        }

        #fullscreenBtn.fs-active #fsIcon .icon-fs-exit {
            display: inline-flex;
        }


        .progress {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 95%;
            cursor: pointer;
            z-index: 20;
            align-self: center;
            height: 10px;
        }

        .progress__track,
        .progress__preview {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            transform: translateY(-50%);
            border-radius: 2px;
            pointer-events: none;
            transition: height 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .progress__track {
            background: var(--track-bg);
            z-index: 1;
        }

        .progress:hover .progress__track,
        .progress:hover .progress__preview .progress.seeking .progress__track,
        .progress.seeking .progress__preview {
            height: 7px;
        }

        .progress__buffer,
        .progress__fill {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 2px;
            pointer-events: none;
        }

        .progress__buffer {
            width: 0%;
            background: var(--buffer-bg);
            transition: width 0.3s ease;
            z-index: 2;
        }

        .progress__fill {
            width: 0%;
            background: var(--main);
            z-index: 3;
            overflow: hidden;
        }

        .progress__preview {
            width: 0%;
            background: var(--preview-bg);
            z-index: 0;
        }


        .progress__thumb {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 14px;
            height: 14px;
            background: var(--main);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 4;
        }

        .progress:hover .progress__thumb,
        .progress.seeking .progress__thumb {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .progress__input {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
            margin: 0;
            padding: 0;
            border: none;
            outline: none;
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
        }

        .progress__input::-webkit-slider-runnable-track,
        .progress__input::-moz-range-track,
        .progress__input::-webkit-slider-thumb,
        .progress__input::-moz-range-thumb {
            height: 0;
            width: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            margin: 0;
            padding: 0;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .progress:hover .progress__track,
        .progress.seeking .progress__track {
            height: 7px;
        }

        .progress:hover .progress__preview,
        .progress.seeking .progress__preview {
            height: 7px;
        }

        .tooltip-style {
            position: absolute;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: var(--bg);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s ease, transform 0.15s ease;
            pointer-events: none;
            z-index: 100;
            max-width: calc(100vw - 32px);
            box-sizing: border-box;
            display: inline-flex;
            width: fit-content;
            justify-content: center;
        }

        .tooltip-style.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .tooltip-style[data-for="playBtn"],
        .tooltip-style[data-for="progress"] {
            left: 20px;
            transform: translateX(0) translateY(6px);
        }

        .tooltip-style[data-for="fullscreenBtn"] {
            left: auto;
            right: 20px;
            transform: translateX(0) translateY(6px);
        }

        .tooltip-style[data-for="playBtn"].show,
        .tooltip-style[data-for="progress"].show,
        .tooltip-style[data-for="fullscreenBtn"].show {
            transform: translateX(0) translateY(0);
        }



        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-block: 15px;
            background: transparent;
            z-index: 126;
            width: 95%;
        }

        .controls__group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .center-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 100%;
            background-color: rgba(17, 17, 17, 0.64);
            color: rgba(255, 255, 255, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 60;
            animation: overlayFadeScale 400ms linear forwards;
        }

        .center-overlay.show {
            opacity: 1;
            visibility: visible;
            animation-name: overlayFadeScale;
        }

        @keyframes overlayFadeScale {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.75);
            }
        }

        .center-overlay .kin-pl-1hosyyw {
            font-size: 16px;
            font-weight: 700;
            font-family: Roboto, sans-serif;
            color: inherit;
            position: relative;
        }

        .center-overlay .icon {
            width: 2em;
            height: 2em;
            color: inherit;
            display: block;
        }

        .center-overlay#overlaySeekForward .kin-pl-1hosyyw,
        .center-overlay#overlaySeekBackward .kin-pl-1hosyyw {
            top: 50%;
            position: absolute;
        }

        .center-overlay#overlaySeekForward .kin-pl-1hosyyw {
            left: 50%;
        }

        .center-overlay#overlaySeekBackward .kin-pl-1hosyyw {
            right: 50%;
        }

        .center-overlay#overlaySeekForward,
        .center-overlay#overlaySeekBackward {
            width: 90px;
            height: 90px;
        }

        #overlayVolume .icon {
            display: none;
        }

        #overlayVolume.show .icon-volume-high,
        #overlayVolume.show .icon-volume-medium,
        #overlayVolume.show .icon-volume-mute {
            display: block;
        }

        .volume-bar-overlay,
        .speed-up-overlay {
            position: absolute;
            top: 20%;
            left: 50%;
            background: rgba(17, 17, 17, 0.8);
            border-radius: 10px;
            padding: 6px 12px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 59;
            transform: translateX(-50%) translateY(0);
            transition: opacity 0.01s;
            display: flex;
            align-items: center;
            gap: 5px
        }

        .speed-up-overlay {
            top: 10%;
        }

        .speed-up-icon {
            display: flex;
            padding: 0px;
        }


        .volume-bar-overlay.show,
        .speed-up-overlay.show {
            opacity: 1;
            visibility: visible;

        }



        .volume-bar-text,
        .speed-up-text {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.88);
            font-family: Roboto, sans-serif;
            display: flex;
            text-align: center;
        }

        .player-poster {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            z-index: 160;
            pointer-events: auto;
        }

        /* Постер виден сразу если есть poster-url */
        .player-poster.ready {
            display: flex;
        }

        .poster-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .poster-play-btn {
            position: relative;
            z-index: 100;
            width: 84px;
            height: 84px;
            border: none;
            border-radius: 100%;
            background-color: rgba(225, 23, 67, 0.64);
            backdrop-filter: blur(4px);
            color: rgba(255, 255, 255, 0.88);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
        }

        .player:hover .poster-play-btn {
            background-color: rgb(225, 23, 67);
            color: rgb(255, 255, 255);
            transform: scale(1.1);
        }

        .poster-play-btn:active {
            transform: scale(0.95);
        }

        .player-poster.poster-fallback {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        #playBtnMobile {
            display: none;
        }

        .mobile {
            display: none;
        }

        #overlaySeekForwardMobile,
        #overlaySeekBackwardMobile {
            display: none;
        }

        @media (max-width:1024px) {
            #playBtnMobile {
                position: absolute;
                display: block;
                top: 50%;
                left: 50%;
                transform: translateX(-50%) translateY(-50%);
                z-index: 100;
                width: 3em;
                height: 3em;
                z-index: 125;
            }

            .icon-play,
            .icon-pause {
                width: 3em;
                height: 3em;
            }

            .controls {
                width: 100%;
                padding-block: 0px;
                padding: 0px;
                align-items: center;
            }

            .mobile {
                display: block;
            }



            .player-ui {
                flex-direction: row;
                align-items: flex-end;

            }

            .controls__group {
                width: 100%;
                gap: 0px;
            }



            .center-overlay {
                display: none;
            }

            #overlaySeekForwardMobile,
            #overlaySeekBackwardMobile {
                display: block;
                height: 100%;
                width: 30%;
                position: absolute;
                background-color: rgba(17, 17, 17, 0.64);
                display: flex;
                align-items: center;
                justify-content: center;
                pointer-events: none;
                opacity: 0;
                transition: 0.1s ease;

            }

            #overlaySeekForwardMobile.show,
            #overlaySeekBackwardMobile.show {
                opacity: 1;
            }

            #overlaySeekForwardMobile {
                top: 0;
                right: 0;
                border-top-left-radius: 50%;
                border-bottom-left-radius: 50%;
            }

            #overlaySeekBackwardMobile {
                top: 0;
                left: 0;
                border-top-right-radius: 50%;
                border-bottom-right-radius: 50%;
            }

            .controls #playBtn {
                display: none;
            }

            #playIconMobile .icon-play {
                display: inline-flex;
            }

            #playIconMobile .icon-pause {
                display: none;
            }

            #playBtnMobile.btn--active #playIconMobile .icon-play {
                display: none;
            }

            #playBtnMobile.btn--active #playIconMobile .icon-pause {
                display: inline-flex;
            }

            .dropdown__menu {
                bottom: 50px;
            }

            .controls__group.second {
                justify-content: flex-end;
                width: max-content;
                position: relative;
            }

            #fullscreenBtn,
            #moreBtn,
            #qualityDropdown,
            #pipBtn {
                padding: 6px 8px;
                height: max-content;
                width: max-content;
            }

            #moreBtn {
                display: none;
            }

            #fsIcon {
                height: 1.75em;
                display: block;
            }

            #duration {
                padding-right: 8px;
            }

            .slash,
            #duration {
                color: grey;
            }

            .progress {
                display: flex;
                width: 100%;
                transition: none;
            }

            .progress:not(.mobile) {
                display: none;
            }

            .progress__track,
            .progress__preview {
                height: 7px;
            }


            .volume,
            .tooltip-style,
            #speedDropdown {
                display: none;
            }

            .progress.mobile.hidden,
            #currentTime.hidden {
                opacity: 0;
                pointer-events: none;
            }
        }

        @media(max-width:425px) {
            .progress {
                flex-shrink: 0;
                padding-right: 2em;
                box-sizing: content-box;
                transition: none;
            }

            #moreBtn {
                display: block;
            }

            #currentTime {
                padding: 6px 8px;
                transition: 0.15s;
                min-width: 7ch;
            }

            #qualityDropdown,
            #pipBtn {
                opacity: 0;
                visibility: hidden;
                transform: translateX(20px);
                transition: 0.15s ease;
            }

            #qualityDropdown.show,
            #pipBtn.show {
                opacity: 1;
                visibility: visible;
                transform: translateX(0);
                display: block;
            }

            .slash,
            #duration {
                display: none;
            }
        }

        .player.ios-native .player-ui,
        .player.ios-native .player-poster,
        .player.ios-native .center-overlay,
        .player.ios-native .loading-spinner,
        .player.ios-native #playBtnMobile {
            display: none !important;
        }

        .player.ios-native video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .ios-poster {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 200;
            align-items: center;
            justify-content: center;
            background: #000;

        .player.ios-native .ios-poster {
            display: flex;
        }
        .player.ios-native .ios-poster.dismissed {
            display: none;
        }
        .ios-poster__img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;

        .ios-poster__btn:active {

            background: rgb(225, 23, 67);

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('src') || 'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8';
        const posterUrl = params.get('poster') || 'images/anime/episodes-banner-season1.webp';
        const player = document.getElementById('player');
        const video = document.getElementById('video');

        if (posterUrl) {
            video.poster = posterUrl;
            const posterImg = document.getElementById('posterImage');
            if (posterImg) posterImg.src = posterUrl;
        }

        // iOS/iPadOS (incl. iPadOS 13+ которая маскируется под macOS)
        const isIOS = (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream)
            || (/Macintosh/.test(navigator.userAgent) && navigator.maxTouchPoints > 1);

        if (isIOS) {
            video.removeAttribute('crossorigin');
            video.src = streamUrl;
            video.setAttribute('controls', '');
            player.classList.add('ios-native');
            player.classList.remove('loading'); // убираем спиннер сразу

            // Постер для iOS
            const iosPoster = document.getElementById('iosPoster');
            const iosPosterImg = document.getElementById('iosPosterImg');
            const iosPosterBtn = document.getElementById('iosPosterBtn');
            if (posterUrl && iosPosterImg) iosPosterImg.src = posterUrl;
            if (iosPosterBtn) {
                iosPosterBtn.addEventListener('click', () => {
                    iosPoster?.classList.add('dismissed');
                    video.play().catch(() => {});
                });
            }
            video.addEventListener('play', () => iosPoster?.classList.add('dismissed'), { once: true });
        } else {
            const updatePlayerSize = () => {
                const h = player.getBoundingClientRect().height;
                player.style.setProperty('--player-h', `${h}px`);
            };
            window.addEventListener('resize', updatePlayerSize);
            updatePlayerSize();
            const formatTime = (sec) => {
                if (!sec || isNaN(sec)) return '0:00';
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const progress = document.querySelector('.progress:not(.mobile)');
            const progressMobile = document.querySelector('.progress.mobile');
            const progressInput = document.getElementById('progressInput');
            const progressInputMobile = document.getElementById('progressInputMobile');
            const fill = document.querySelector('.progress:not(.mobile) .fill');
            const thumb = document.querySelector('.progress:not(.mobile) .thumb');
            const buffer = document.querySelector('.progress:not(.mobile) .buffer');
            const preview = document.querySelector('.progress:not(.mobile) .preview');
            const fillMobile = progressMobile?.querySelector('.fill');
            const thumbMobile = progressMobile?.querySelector('.thumb');
            const bufferMobile = progressMobile?.querySelector('.buffer');
            const previewMobile = progressMobile?.querySelector('.preview');
            const currentTimeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('duration');
            const playBtn = document.getElementById('playBtn');
            const playBtnMobile = document.getElementById('playBtnMobile');
            const muteBtn = document.getElementById('muteBtn');
            const pipBtn = document.getElementById('pipBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const fsIcon = document.getElementById('fsIcon');
            const speedDropdown = document.getElementById('speedDropdown');
            const speedMenu = document.getElementById('speedMenu');
            const qualityDropdown = document.getElementById('qualityDropdown');
            const qualityMenu = document.getElementById('qualityMenu');
            const progressTooltip = document.getElementById('progressTooltip');

            let hls, lastVolume = 1, isDraggingVolume = false, isSeeking = false, wasPlaying = false;
            let bufferingTimer = null;


            const overlayVolume = document.getElementById('overlayVolume');
            const volumeBarOverlay = document.getElementById('volumeBarOverlay');
            const volumeBarOverlayFill = document.getElementById('volumeBarOverlayFill');
            const volumeBarText = document.getElementById('volumeBarText');
            const volumeBar = document.getElementById('volumeBar');
            const volumeFill = document.getElementById('volumeFill');
            const volumeIcon = document.getElementById('volumeIcon');
            const speedLabel = document.getElementById('speedLabel');
            const qualityLabel = document.getElementById('qualityLabel');
            const moreBtn = document.getElementById('moreBtn');
            const isMobile = window.matchMedia('(pointer: coarse)').matches;
            const BUFFERING_DELAY = 3000;

            const overlays = {
                seekForward: document.getElementById('overlaySeekForward'),
                seekBackward: document.getElementById('overlaySeekBackward'),
                seekForwardMobile: document.getElementById('overlaySeekForwardMobile'),
                seekBackwardMobile: document.getElementById('overlaySeekBackwardMobile'),
                play: document.getElementById('overlayPlay'),
                pause: document.getElementById('overlayPause'),
                volume: overlayVolume,
            };

            moreBtn.addEventListener('click', () => {
                if (qualityDropdown.classList.contains('show') || pipBtn.classList.contains('show')) {
                    qualityDropdown.classList.remove('show');
                    pipBtn.classList.remove('show');
                    currentTimeEl.classList.remove('hidden');
                    progressMobile.classList.remove('hidden');
                    return;
                }
                qualityDropdown.classList.add('show');
                pipBtn.classList.add('show');
                currentTimeEl.classList.add('hidden');
                progressMobile.classList.add('hidden');
            });

            let isControlsActive = false;
            let showOverlayOnToggle = true;

            const posterEl = document.getElementById('playerPoster');
            const posterImg = document.getElementById('posterImage');
            const posterBtn = document.getElementById('posterPlayBtn');

            let posterShown = false;

            const dismissPoster = () => {
                if (posterEl) posterEl.classList.remove('ready');
                posterShown = true;
            };

            // Показываем постер сразу — не ждём loadedmetadata
            if (posterEl && posterUrl) {
                posterEl.classList.add('ready');
                posterShown = false;
            }

            posterImg?.addEventListener('error', () => {
                posterImg.style.display = 'none';
                posterEl?.classList.add('poster-fallback');
            });

            posterEl?.addEventListener('click', (e) => {
                e.stopPropagation();
                if (video.paused) video.play().catch(() => { });
                dismissPoster();
                isControlsActive = true;
                player.focus();
            });

            video.addEventListener('play', dismissPoster, { once: true });

            const UI_FS_HIDE_DELAY = 3000;

            const playerUi = document.querySelector('.player-ui');

            let uiHideTimer = null;
            let isUiPinnedByHover = false;

            const isFS = () => document.fullscreenElement === player;
            const isPaused = () => video.paused;

            const showUi = () => {
                clearTimeout(uiHideTimer);
                player.classList.add('ui-visible');
            };

            const scheduleHideUi = (delay) => {
                clearTimeout(uiHideTimer);

                if (delay === 0) {
                    if (!isPaused() && !isUiPinnedByHover) {
                        player.classList.remove('ui-visible');
                    }
                    return;
                }

                uiHideTimer = setTimeout(() => {
                    if (!isPaused() && !isUiPinnedByHover) {
                        player.classList.remove('ui-visible');
                    }
                }, delay);
            };

            const updateUiVisibility = (forceShow = false) => {
                if (isPaused()) {
                    showUi();
                    clearTimeout(uiHideTimer);
                    return;
                }
                if (forceShow) {
                    showUi();
                    scheduleHideUi(UI_FS_HIDE_DELAY);
                }
            };

            player.addEventListener('mousemove', (e) => {
                if (window.matchMedia('(pointer: fine)').matches === false) return;
                if (isFS()) player.classList.add('Fs');
                else player.classList.remove('Fs');
                updateUiVisibility(true);
            });

            player.addEventListener('mouseleave', () => {
                if (!isFS() && !isPaused()) {
                    scheduleHideUi(UI_FS_HIDE_DELAY);
                }
            });

            const controlsEl = document.querySelector('.controls');
            const progressEl = document.querySelector('.progress');

            const onControlsEnter = () => {
                if (!isPaused()) {
                    isUiPinnedByHover = true;
                    clearTimeout(uiHideTimer);
                }
            };
            const onControlsLeave = () => {
                isUiPinnedByHover = false;
                if (!isPaused()) scheduleHideUi(UI_FS_HIDE_DELAY);
            };

            controlsEl.addEventListener('mouseenter', onControlsEnter);
            controlsEl.addEventListener('mouseleave', onControlsLeave);
            progressEl.addEventListener('mouseenter', onControlsEnter);
            progressEl.addEventListener('mouseleave', onControlsLeave);

            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement === player) {
                    player.classList.add('Fs');
                    showUi();
                    if (!isPaused()) scheduleHideUi(UI_FS_HIDE_DELAY);
                } else {
                    player.classList.remove('Fs');
                    isUiPinnedByHover = false;
                    clearTimeout(uiHideTimer);
                    player.classList.remove('ui-visible');
                }
            });


            video.addEventListener('play', () => {
                isControlsActive = true;
                player.focus();
                scheduleHideUi(UI_FS_HIDE_DELAY);
            });

            video.addEventListener('pause', () => {
                showUi();
                clearTimeout(uiHideTimer);
            });

            const showBufferingSpinner = () => {
                player.classList.add('loading');
            };

            const hideBufferingSpinner = () => {
                if (video.readyState >= 3) {
                    player.classList.remove('loading');
                }
            };

            const updateBufferingState = () => {
                if (video.paused) {
                    player.classList.remove('loading');
                    return;
                }

                const isBuffering = video.readyState < 3 && video.networkState !== 0;

                if (isBuffering) {
                    clearTimeout(bufferingTimer);
                    bufferingTimer = setTimeout(() => {
                        player.classList.add('loading');
                        player.offsetHeight;
                    }, BUFFERING_DELAY);
                } else {
                    clearTimeout(bufferingTimer);
                    player.classList.remove('loading');
                }
            };
            let overlayTimeout = null;
            let volumeBarTimeout = null;
            let lastSeekTime = 0;
            const SEEK_DEBOUNCE = 100;

            const canSeek = () => {
                const now = Date.now();
                if (now - lastSeekTime >= SEEK_DEBOUNCE) {
                    lastSeekTime = now;
                    return true;
                }
                return false;
            };

            const showVolumeOverlay = () => {
                const v = video.muted ? 0 : video.volume;
                const icons = {
                    high: overlayVolume.querySelector('.icon-volume-high'),
                    medium: overlayVolume.querySelector('.icon-volume-medium'),
                    mute: overlayVolume.querySelector('.icon-volume-mute'),
                };

                Object.values(icons).forEach(icon => { if (icon) icon.style.display = 'none'; });
                if (v === 0) icons.mute.style.display = 'block';
                else if (v < 0.5) icons.medium.style.display = 'block';
                else icons.high.style.display = 'block';
                showOverlay(overlayVolume);

                updateVolumeBarOverlay();
                volumeBarOverlay.classList.add('show');

                clearTimeout(volumeBarTimeout);
                volumeBarTimeout = setTimeout(() => {
                    volumeBarOverlay.classList.remove('show');
                }, 800);
            };

            const updateVolumeBarOverlay = () => {
                const pct = Math.round((video.muted ? 0 : video.volume) * 100);
                volumeBarText.textContent = `${pct}%`;
            };

            const showOverlay = (overlay) => {
                Object.values(overlays).forEach(o => {
                    if (o) {
                        o.classList.remove('show');
                        o.style.animation = 'none';
                        o.offsetHeight;
                        o.style.animation = '';
                    }
                });

                if (overlay) {
                    overlay.classList.add('show');
                    clearTimeout(overlayTimeout);
                    overlayTimeout = setTimeout(() => {
                        overlay.classList.remove('show');
                    }, 400);
                }
            };

            const showSeekForward = () => showOverlay(overlays.seekForward);
            const showSeekBackward = () => showOverlay(overlays.seekBackward);
            const showSeekForwardMobile = () => showOverlay(overlays.seekForwardMobile);
            const showSeekBackwardMobile = () => showOverlay(overlays.seekBackwardMobile);
            const showPlayOverlay = () => showOverlay(overlays.play);
            const showPauseOverlay = () => showOverlay(overlays.pause);


            const updateBuffer = () => {
                if (!video.duration || !isFinite(video.duration)) return;

                const buffered = video.buffered;
                if (!buffered || buffered.length === 0) return;

                const bufferedEnd = buffered.end(buffered.length - 1);
                const bufferedPct = `${Math.min(100, (bufferedEnd / video.duration) * 100)}%`;

                if (buffer) buffer.style.width = bufferedPct;
                if (bufferMobile) bufferMobile.style.width = bufferedPct;
            };
            if (Hls.isSupported()) {
                hls = new Hls({ capLevelToPlayerSize: true, maxBufferLength: 30, startLevel: -1 });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.BUFFER_APPENDED, updateBuffer);
                hls.on(Hls.Events.FRAG_LOADED, updateBuffer);

                video.addEventListener('loadedmetadata', () => {
                    if (durationEl && isFinite(video.duration)) {
                        durationEl.textContent = formatTime(video.duration);
                    }
                    updateBuffer();
                }, { once: true });

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (durationEl && isFinite(video.duration)) {
                        durationEl.textContent = formatTime(video.duration);
                    }
                    player.classList.remove('loading');
                    renderQualityMenu();
                    updateBuffer();
                });

                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                        player.classList.remove('loading');
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('progress', updateBuffer);
                video.addEventListener('timeupdate', updateBuffer);
                video.addEventListener('loadedmetadata', () => {
                    player.classList.remove('loading');
                    if (durationEl && isFinite(video.duration)) {
                        durationEl.textContent = formatTime(video.duration);
                    }
                    updateBuffer();
                }, { once: true });
            }
            setTimeout(() => player.classList.remove('loading'), 10000);

            function initDropdown(trigger, menu, onSelect, tooltipSelector) {
                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = trigger.parentElement.classList.toggle('open');
                    if (tooltipSelector) {
                        const tooltip = document.querySelector(tooltipSelector);
                        if (tooltip) tooltip.classList.toggle('hidden-by-dropdown', isOpen);
                    }
                    document.querySelectorAll('.dropdown.open').forEach(d => {
                        if (d !== trigger.parentElement) {
                            d.classList.remove('open');
                            const t = d.querySelector('.tooltip-style');
                            if (t) t.classList.remove('hidden-by-dropdown');
                        }
                    });
                });
                menu.addEventListener('click', (e) => {
                    const opt = e.target.closest('.dropdown__option');
                    if (!opt) return;
                    const type = opt.dataset.type || 'quality';
                    const val = opt.dataset.value;
                    onSelect(val, type); 

                    menu.querySelectorAll('.dropdown__option').forEach(o => o.classList.remove('dropdown__option--selected'));
                    opt.classList.add('dropdown__option--selected');
                    trigger.parentElement.classList.remove('open');
                    if (tooltipSelector) {
                        const tooltip = document.querySelector(tooltipSelector);
                        if (tooltip) tooltip.classList.remove('hidden-by-dropdown');
                    }
                });
            }

            function renderSpeedMenu() {
                const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
                speedMenu.innerHTML = speeds.map(s =>
                    `<button class="dropdown__option ${s === 1 ? 'dropdown__option--selected' : ''}" data-value="${s}">${s}x</button>`
                ).join('');
                speedLabel.textContent = `${video.playbackRate}x`;
            }
            renderSpeedMenu();
            initDropdown(
                speedMenu.previousElementSibling,
                speedMenu,
                (val) => { video.playbackRate = parseFloat(val); speedLabel.textContent = `${val}x`; },
                '.tooltip-style[data-for="speedDropdown"]'
            );
            initDropdown(
                qualityMenu.previousElementSibling,
                qualityMenu,
                (val, type) => {
                    if (type === 'speed') {
                        video.playbackRate = parseFloat(val);
                        if (!isMobile && speedLabel) speedLabel.textContent = `${val}x`;
                    } else if (type === 'quality' && hls) {
                        hls.currentLevel = parseInt(val, 10);
                    }
                },
                '.tooltip-style[data-for="qualityDropdown"]'
            );

            function updateQualityIcon() {
                if (!hls || !hls.levels.length) {
                    qualityLabel.classList.remove('sd-mode');
                    return;
                }

                let height = 0;
                if (hls.currentLevel === -1) {
                    height = hls.levels[hls.currentLevel]?.height || 0;
                } else {
                    height = hls.levels[hls.currentLevel]?.height || 0;
                }


                if (height > 720) {
                    qualityLabel.classList.remove('sd-mode');
                } else {
                    qualityLabel.classList.add('sd-mode');
                }
            }

            function renderQualityMenu() {
                if (!hls || !hls.levels.length) return;

                const levels = hls.levels.map((l, i) =>
                    `<button class="dropdown__option" data-type="quality" data-value="${i}">${l.height}p</button>`
                ).join('');
                const speedSection = isMobile ? `
                <div style="border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;"></div>
                <button class="dropdown__option" style="font-weight:700; color:rgba(255,255,255,0.6); cursor:default;" disabled>Скорость</button>
                ${[0.5, 0.75, 1, 1.25, 1.5, 2].map(s =>
                    `<button class="dropdown__option ${s === video.playbackRate ? 'dropdown__option--selected' : ''}" 
                            data-type="speed" data-value="${s}">${s}x</button>`
                ).join('')}
            ` : '';
                qualityMenu.innerHTML = `
                <button class="dropdown__option dropdown__option--selected" data-type="quality" data-value="-1">Auto</button>
                ${levels}
                ${speedSection}
            `;

                updateQualityIcon();
            }

            if (hls) {
                hls.on(Hls.Events.LEVEL_SWITCHED, () => {
                    updateQualityIcon();
                    qualityMenu.querySelectorAll('.dropdown__option').forEach(o => o.classList.remove('dropdown__option--selected'));
                    if (hls.currentLevel === -1) {
                        qualityMenu.querySelector('[data-value="-1"]')?.classList.add('dropdown__option--selected');
                    } else {
                        qualityMenu.querySelector(`[data-value="${hls.currentLevel}"]`)?.classList.add('dropdown__option--selected');
                    }
                });
            }
            document.addEventListener('click', () => document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open')));


            const EDGE_TOOLTIPS = ['playBtn', 'progress', 'fullscreenBtn'];
            document.querySelectorAll('.tooltip-style[data-for]').forEach(tooltip => {
                const targetId = tooltip.dataset.for;
                const el = document.getElementById(targetId);
                if (!el) return;
                const target = el.classList.contains('dropdown')
                    ? el.querySelector('.dropdown__trigger') || el
                    : el;
                const isEdge = EDGE_TOOLTIPS.includes(targetId);
                const updatePos = () => {
                    if (isEdge) return;
                    const pr = player.getBoundingClientRect();
                    const tr = target.getBoundingClientRect();
                    const cx = (tr.left + tr.width / 2) - pr.left;
                    const tw = tooltip.offsetWidth || 100;
                    const pad = 8;
                    tooltip.style.left = `${Math.max(pad + tw / 2, Math.min(pr.width - pad - tw / 2, cx))}px`;
                };
                target.addEventListener('mouseenter', () => { if (!isEdge) updatePos(); tooltip.classList.add('show'); });
                target.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
                target.addEventListener('focus', () => { if (!isEdge) updatePos(); tooltip.classList.add('show'); });
                target.addEventListener('blur', () => tooltip.classList.remove('show'));
                window.addEventListener('resize', () => { if (tooltip.classList.contains('show') && !isEdge) updatePos(); });
            });

            const updatePreview = (clientX, container = progress) => {
                const pr = container.getBoundingClientRect();
                const pl = player.getBoundingClientRect();

                const pct = Math.max(0, Math.min(100, ((clientX - pr.left) / pr.width) * 100));

                preview.style.width = `${pct}%`;
                const cx = clientX - pl.left;
                const tw = progressTooltip.offsetWidth || 70;
                const pad = 8;
                const min = pad + tw / 1.5;
                const max = pl.width - pad - tw / 1.5;
                progressTooltip.style.left = `${Math.max(min, Math.min(max, cx))}px`;
                progressTooltip.style.transform = 'translateX(-50%) translateY(0)';
                if (video.duration) progressTooltip.textContent = formatTime((pct / 100) * video.duration);
            };
            const updateProgressTooltip = () => {
                progressTooltip.classList.toggle('show', progressIsHovered || isSeeking);
            };

            progress.addEventListener('mouseenter', () => { progressIsHovered = true; updateProgressTooltip(); });
            progress.addEventListener('mouseleave', () => { progressIsHovered = false; preview.style.width = '0%'; updateProgressTooltip(); });
            progress.addEventListener('mousemove', (e) => updatePreview(e.clientX));
            progressMobile?.addEventListener('touchmove', (e) => { if (e.touches[0]) updatePreview(e.touches[0].clientX, progressMobile); }, { passive: true });

            let isDraggingProgress = false;
            let progressIsHovered = false;

            const seekToClientX = (clientX, container = progress) => {
                const pr = container.getBoundingClientRect();
                const pct = Math.max(0, Math.min(100, ((clientX - pr.left) / pr.width) * 100));

                if (video.duration) {
                    video.currentTime = (pct / 100) * video.duration;
                    updateProgress();
                }
            };

            progressInput.addEventListener('mousedown', (e) => {
                e.preventDefault();
                isSeeking = true;
                isDraggingProgress = true;
                wasPlaying = !video.paused;
                progress.classList.add('seeking');
                if (wasPlaying) video.pause();
                seekToClientX(e.clientX, progress);
                updateProgressTooltip();
            });
            document.addEventListener('mousemove', (e) => { if (isSeeking) { seekToClientX(e.clientX, progress); updatePreview(e.clientX, progress); } });
            document.addEventListener('mouseup', () => {
                if (isSeeking) {
                    isSeeking = false;
                    if (wasPlaying) video.play().catch(() => { });
                    wasPlaying = false;
                    progress.classList.remove('seeking');
                }
                if (isDraggingProgress) { setTimeout(() => { isDraggingProgress = false; updateProgressTooltip(); }, 0); }
            });

            const onStartTouch = (e) => {
                if (!e.touches[0] || !progressMobile) return;
                isSeeking = true;
                isDraggingProgress = true;
                wasPlaying = !video.paused;
                progressMobile.classList.add('seeking');
                if (wasPlaying) video.pause();
                seekToClientX(e.touches[0].clientX, progressMobile);
                updateProgressTooltip();
            };

            const onMoveTouch = (e) => {
                if (!isSeeking || !e.touches[0] || !progressMobile) return;
                if (e.cancelable) e.preventDefault();
                seekToClientX(e.touches[0].clientX, progressMobile);
                updatePreview(e.touches[0].clientX, progressMobile);
            };

            const onEndTouch = (e) => {
                if (!isSeeking || !progressMobile) return;
                if (e.changedTouches[0]) seekToClientX(e.changedTouches[0].clientX, progressMobile);
                isSeeking = false;
                isDraggingProgress = false;
                progressMobile.classList.remove('seeking');
                updateProgressTooltip();
                if (wasPlaying) video.play().catch(() => { });
                wasPlaying = false;
            };


            if (progressInputMobile) {
                progressInputMobile.addEventListener('touchstart', onStartTouch, { passive: true });
                progressInputMobile.addEventListener('touchmove', onMoveTouch, { passive: false }); 
                progressInputMobile.addEventListener('touchend', onEndTouch, { passive: true });
                progressInputMobile.addEventListener('touchcancel', onEndTouch, { passive: true });
            }

            const updateProgress = () => {
                if (!video.duration) return;
                const pct = (video.currentTime / video.duration) * 100;
                const pctStr = `${pct}%`;
                fill.style.width = pctStr;
                thumb.style.left = pctStr;
                progressInput.value = pct;
                if (fillMobile) fillMobile.style.width = pctStr;
                if (thumbMobile) thumbMobile.style.left = pctStr;
                if (progressInputMobile) progressInputMobile.value = pct;
                currentTimeEl.textContent = formatTime(video.currentTime);
            };


            const togglePlay = (showOverlay = true) => {
                const scrollY = window.scrollY;
                if (video.paused) {
                    video.play().then(() => { window.scrollTo({ top: scrollY, behavior: 'instant' }); }).catch(() => { });
                    playBtn.classList.add('btn--active');
                    playBtnMobile.classList.add('btn--active');
                } else {
                    video.pause();
                    window.scrollTo({ top: scrollY, behavior: 'instant' });
                    playBtn.classList.remove('btn--active');
                    playBtnMobile.classList.remove('btn--active');
                }
            };
            playBtn.addEventListener('click', togglePlay);
            player.addEventListener('click', (e) => {
                if (isDraggingProgress) return;
                if (window.matchMedia('(max-width: 1024px)').matches) return;
                if (!e.target.closest('.controls') && !e.target.closest('.progress')) {
                    showOverlayOnToggle = true;
                    togglePlay();
                }
            });
            video.addEventListener('play', () => {
                playBtn.classList.add('btn--active');
                playBtnMobile.classList.add('btn--active');
                if (showOverlayOnToggle) { showPlayOverlay(); showOverlayOnToggle = false; }
            });
            video.addEventListener('pause', () => {
                playBtn.classList.remove('btn--active');
                playBtnMobile.classList.remove('btn--active');
                if (showOverlayOnToggle) { showPauseOverlay(); showOverlayOnToggle = false; }
            });


            video.addEventListener('waiting', updateBufferingState);
            video.addEventListener('playing', updateBufferingState);
            video.addEventListener('stalled', updateBufferingState);
            video.addEventListener('canplay', updateBufferingState);
            video.addEventListener('canplaythrough', updateBufferingState);
            video.addEventListener('loadeddata', updateBufferingState);
            video.addEventListener('error', hideBufferingSpinner); 
            video.addEventListener('timeupdate', updateProgress);
            video.addEventListener('timeupdate', updateBufferingState);

            const updateVolumeFill = () => {
                volumeFill.style.width = `${(video.muted ? 0 : video.volume) * 100}%`;
            };
            const updateVolumeIcon = () => {
                const v = video.muted ? 0 : video.volume;
                volumeIcon.classList.remove('volume-medium', 'volume-muted');
                if (v === 0) {
                    volumeIcon.classList.add('volume-muted');
                } else if (v < 0.5) {
                    volumeIcon.classList.add('volume-medium');
                }
            };


            const setVolume = (e) => {
                const rect = volumeBar.getBoundingClientRect();
                if (rect.width === 0) return;

                video.volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                video.muted = false;
                lastVolume = video.volume;

                updateVolumeFill();
                updateVolumeIcon();
            };
            volumeBar.addEventListener('mousedown', (e) => { e.preventDefault(); isDraggingVolume = true; setVolume(e); });
            document.addEventListener('mousemove', (e) => { if (isDraggingVolume) setVolume(e); });
            document.addEventListener('mouseup', () => { isDraggingVolume = false; });

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                if (video.muted) lastVolume = video.volume;
                else video.volume = lastVolume;
                updateVolumeFill();
                updateVolumeIcon();
                showVolumeOverlay();
            });

            pipBtn.addEventListener('click', async () => {
                try {
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                    } else if (document.pictureInPictureEnabled) {
                        await video.requestPictureInPicture();
                    }
                } catch (e) { console.warn('PiP:', e); }
            });

            video.addEventListener('enterpictureinpicture', () => {
                pipBtn.classList.add('btn--active');
            });

            video.addEventListener('leavepictureinpicture', () => {
                pipBtn.classList.remove('btn--active');
            });


            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    player.requestFullscreen?.();
                    fullscreenBtn.classList.add('fs-active');
                } else {
                    document.exitFullscreen?.();
                    fullscreenBtn.classList.remove('fs-active');
                }
            };

            fullscreenBtn.addEventListener('click', toggleFullscreen);

            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) {
                    fullscreenBtn.classList.add('fs-active');
                } else {
                    fullscreenBtn.classList.remove('fs-active');
                }
            });

            let spaceKeyPressedAt = null;
            let spaceKeyLongPressTimer = null;
            const LONG_PRESS_DURATION = 300;
            let isSpaceKeyLongPressed = false;


            window.addEventListener('keydown', (e) => {
                if ((e.key === ' ' || e.key === 'Spacebar') && !['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) {
                    e.preventDefault();
                }
            }, { passive: false });


            let isSpeedUpPaused = false;
            document.addEventListener('keydown', (e) => {
                if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
                const key = e.key.toLowerCase();
                if (key === ' ') {
                    e.preventDefault();
                    if (spaceKeyPressedAt !== null) return;
                    spaceKeyPressedAt = Date.now();
                    isSpaceKeyLongPressed = false;
                    spaceKeyLongPressTimer = setTimeout(() => {
                        isSpaceKeyLongPressed = true;
                        video.playbackRate = 2;
                        if (video.paused) {
                            video.play();
                            isSpeedUpPaused = true;

                        }
                        speedUpOverlay.classList.add('show');
                    }, LONG_PRESS_DURATION);

                    return;
                }

                if (key === 'k') {
                    e.preventDefault();
                    showOverlayOnToggle = true;
                    togglePlay();
                    if (!video.paused) {
                        isControlsActive = true;
                        player.focus();
                    }
                    return;
                }

                if (key === 'f') { toggleFullscreen(); return; }
                if (key === 'm') {
                    video.muted = !video.muted;
                    if (video.muted) lastVolume = video.volume; else video.volume = lastVolume;
                    updateVolumeFill();
                    updateVolumeIcon();
                    return;
                }
                if (!isControlsActive) return;

                switch (key) {
                    case 'arrowleft':
                        if (canSeek()) {
                            video.currentTime = Math.max(0, video.currentTime - 5);
                            updateProgress();
                            showOverlay(overlays.seekBackward);
                        }
                        break;
                    case 'arrowright':
                        if (canSeek()) {
                            video.currentTime = Math.min(video.duration || 0, video.currentTime + 5);
                            updateProgress();
                            showOverlay(overlays.seekForward);
                        }
                        break;
                    case 'arrowup':
                        e.preventDefault();
                        if (video.volume < 1) video.volume = Math.min(1, video.volume + 0.05);
                        video.muted = false;
                        updateVolumeFill();
                        updateVolumeIcon();
                        showVolumeOverlay();
                        break;
                    case 'arrowdown':
                        e.preventDefault();
                        if (video.volume > 0) video.volume = Math.max(0, video.volume - 0.05);
                        updateVolumeFill();
                        updateVolumeIcon();
                        showVolumeOverlay();
                        break;
                }
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === ' ') {
                    e.preventDefault();
                    if (spaceKeyLongPressTimer !== null) {
                        clearTimeout(spaceKeyLongPressTimer);
                        spaceKeyLongPressTimer = null;
                    }
                    if (isSpaceKeyLongPressed) {
                        video.playbackRate = 1;
                        speedUpOverlay.classList.remove('show');
                        isSpaceKeyLongPressed = false;
                        if (isSpeedUpPaused) {
                            video.pause();
                            isSpeedUpPaused = false;
                        }
                    } else {
                        showOverlayOnToggle = true;
                        togglePlay();
                        if (!video.paused) {
                            isControlsActive = true;
                            player.focus();
                        }
                    }

                    spaceKeyPressedAt = null;
                }
            });


            let lastTap = 0;
            let tapTimeout;

            player.addEventListener('touchstart', (e) => {
                if (e.target.closest('button') || e.target.closest('.dropdown') || e.target.closest('.progress')) {
                    return;
                }

                const currentTime = Date.now();
                const tapLength = currentTime - lastTap;
                clearTimeout(tapTimeout);

                if (tapLength < 300 && tapLength > 0) {
                    const rect = player.getBoundingClientRect();
                    const touchX = e.touches[0].clientX - rect.left;
                    const playerWidth = rect.width;

                    if (touchX < playerWidth * 0.3) {
                        video.currentTime = Math.max(0, video.currentTime - 10);
                        showSeekBackwardMobile();
                    } else if (touchX > playerWidth * 0.7) {
                        video.currentTime = Math.min(video.duration, video.currentTime + 10);
                        showSeekForwardMobile();
                    }
                    lastTap = 0;
                } else {
                    tapTimeout = setTimeout(() => {
                        if (player.classList.contains('ui-visible')) {
                            player.classList.remove('ui-visible');
                            clearTimeout(uiHideTimer);
                        } else {
                            player.classList.add('ui-visible');
                            clearTimeout(uiHideTimer);
                            uiHideTimer = setTimeout(() => {
                                if (!video.paused && !isUiPinnedByHover) {
                                    player.classList.remove('ui-visible');
                                }
                            }, 3000);
                        }
                    }, 300);
                    lastTap = currentTime;
                    lastTap = currentTime;
                }
            }, { passive: false });
            if (playBtnMobile) {
                playBtnMobile.addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePlay();
                });
            }
        }
    </script>
</body>
</html>
