<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5/dist/shaka-player.ui.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5/dist/controls.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .shaka-spinner-container .shaka-spinner svg g circle {
            stroke: rgba(255, 255, 255, 0.2) !important;
            stroke-opacity: 1 !important;
        }

        .shaka-spinner-container .shaka-spinner svg g path {
            stroke: rgba(224, 11, 82, 0.8) !important;
            /* Сделал чуть ярче для контраста */
            stroke-linecap: round !important;
        }


        .shaka-range-element {
            background: transparent !important;
        }

        .shaka-seek-bar-container .shaka-range-element::-webkit-slider-thumb {
            background: rgb(224, 11, 82) !important;
            transform: translateX(-1px);
        }

        .shaka-seek-bar-container .shaka-range-element::-moz-range-thumb {
            background: rgb(224, 11, 82) !important;
            transform: translateX(-1px);
        }

        #skip-btn {
            display: none;
            position: fixed;
            bottom: 90px;
            right: 16px;
            z-index: 100;
            gap: 10px;

        }

        #skip-btn-dismiss,
        #skip-btn-action {
            background: rgba(28, 28, 28, 0.9);
            color: #fff;
            border: none;
            border-radius: 12px;
            transition: opacity cubic-bezier(0.4, 0, 0.6, 1) 0.6s;
            padding: 5px;
            cursor: pointer;
        }

        #skip-btn-dismiss-inner,
        #skip-btn-action-inner {
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
        }

        #skip-btn.visible {
            display: flex;
        }

        #skip-btn-dismiss:hover #skip-btn-dismiss-inner,
        #skip-btn-action:hover #skip-btn-action-inner {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div id="player-container">
        <video id="video" playsinline></video>
        <div id="skip-btn">
            <button id="skip-btn-dismiss">
                <div id="skip-btn-dismiss-inner"><img style="display: block; font-size: 16px;" class="shaka-ui-icon"
                        src="/images/player-vector/file-x.svg"></div>
            </button>
            <button id="skip-btn-action">
                <div id="skip-btn-action-inner">Пропустить опенинг</div>
            </button>
        </div>
    </div>
    <script>
        function onError(error) {
            console.error('Shaka Error:', error.code, error.message || error);
        }
        async function init() {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) {
                alert('Браузер не поддерживается');
                return;
            }

            const video = document.getElementById('video');
            const container = document.getElementById('player-container');
            const skipBtn = document.getElementById('skip-btn');
            const player = new shaka.Player();
            await player.attach(video);

            player.addEventListener('error', (e) => onError(e.detail));


            const ui = new shaka.ui.Overlay(player, container, video);
            const controls = ui.getControls();


            const params = new URLSearchParams(location.search);
            const src = params.get('src');
            const poster = params.get('poster');
            const skipStart = parseFloat(params.get('skip_start') || '-1');
            const skipEnd = parseFloat(params.get('skip_end') || '-1');

            if (poster) video.poster = poster;

            ui.configure({
                enableKeyboardPlaybackControls: false,
                addSeekBar: true,
                controlPanelElements: [
                    'play_pause', 'mute', 'volume', 'time_and_duration',
                    'spacer', 'overflow_menu', 'picture_in_picture', 'fullscreen'
                ],
                overflowMenuButtons: ['quality', 'playback_rate', 'captions', 'loop'],
                seekBarColors: { played: 'rgb(224, 11, 82)' }
            });

            const localization = controls.getLocalization();
            const RU = 'ru';
            localization.insert(RU, new Map([
                ['PLAY', 'Воспроизвести'],
                ['PAUSE', 'Пауза'],
                ['REPLAY', 'Повторить'],
                ['MUTE', 'Выключить звук'],
                ['UNMUTE', 'Включить звук'],
                ['FULL_SCREEN', 'Полный экран'],
                ['EXIT_FULL_SCREEN', 'Выйти'],
                ['ENTER_PICTURE_IN_PICTURE', 'Картинка в картинке'],
                ['MORE_SETTINGS', 'Настройки'],
                ['CAPTIONS', 'Субтитры'],
                ['LOOP', 'Повтор'],
                ['PLAYBACK_RATE', 'Скорость'],
                ['QUALITY', 'Качество'],
                ['AUTO_QUALITY', 'Авто'],
                ['RESOLUTION', 'Разрешение'],
                ['OFF', 'Выкл'],
            ]));
            localization.changeLocale([RU]);

            window.addEventListener('keydown', (e) => {
                if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
                switch (e.code) {
                    case 'Space':
                    case 'KeyK':
                        e.preventDefault();
                        video.paused ? video.play() : video.pause();
                        break;
                    case 'ArrowRight':
                        video.currentTime += 5;
                        break;
                    case 'ArrowLeft':
                        video.currentTime -= 5;
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        video.volume = Math.min(1, video.volume + 0.1);
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        video.volume = Math.max(0, video.volume - 0.1);
                        break;
                    case 'KeyM':
                        video.muted = !video.muted;
                        break;
                    case 'KeyF':
                        controls.toggleFullScreen();
                        break;
                }
            });

            const shakaButtons = container.querySelectorAll('button, .shaka-range-element');
            shakaButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    btn.blur(); 
                });
            });

            const skipAction = document.getElementById('skip-btn-action');
            const skipDismiss = document.getElementById('skip-btn-dismiss');
            const skipTarget = (skipEnd > skipStart && skipEnd >= 0) ? skipEnd : skipStart + 85;

            let skipDismissed = false;

            video.addEventListener('timeupdate', () => {
                const isInsideRange = video.currentTime > skipStart && video.currentTime < skipTarget && skipStart >= 0;
                const overflowMenu = document.querySelector('.shaka-overflow-menu');
                const isMenuOpen = overflowMenu && !overflowMenu.classList.contains('shaka-hidden');
                if (isInsideRange && !skipDismissed && !isMenuOpen) {
                    skipBtn.classList.add('visible');
                } else {
                    skipBtn.classList.remove('visible');
                }
            });

            const silenceShaka = (e) => {
                e.stopPropagation();
                e.stopImmediatePropagation();
                if (controls && typeof controls.setEnabledShakaControls === 'function') {
                    controls.setEnabledShakaControls(false);
                    setTimeout(() => controls.setEnabledShakaControls(true), 400);
                }
            };

            ['pointerdown', 'touchstart', 'mousedown'].forEach(type => {
                skipBtn.addEventListener(type, silenceShaka, true);
            });

            skipAction.addEventListener('click', (e) => {
                e.stopPropagation();
                e.stopImmediatePropagation();
                video.currentTime = skipTarget;
                skipBtn.classList.remove('visible');
                if (controls && typeof controls.hideUI === 'function') {
                    controls.hideUI();
                }
            }, true);

            skipDismiss.addEventListener('click', (e) => {
                e.stopPropagation();
                e.stopImmediatePropagation();
                skipDismissed = true;
                skipBtn.classList.remove('visible');
                if (controls && typeof controls.hideUI === 'function') {
                    controls.hideUI();
                }
            }, true);

            const overflowBtn = document.querySelector('.shaka-overflow-menu-button');
            if (overflowBtn) {
                overflowBtn.addEventListener('click', () => {
                    skipBtn.classList.remove('visible');
                });
            }

            if (src) {
                try {
                    await player.load(src);
                } catch (e) {
                    onError(e);
                }
            }
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
